<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  {% seo %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}" class="site-name">Geonwoo Kim</a>
      <div class="nav-links">
        <a href="{{ '/#work' | relative_url }}">Work</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="mailto:{{ site.email }}">Contact</a>
      </div>
    </nav>
  </header>

  <main class="site-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>© {{ 'now' | date: "%Y" }} Geonwoo Kim · <a href="mailto:{{ site.email }}">{{ site.email }}</a></p>
    </div>
  </footer>
  <script src="{{ '/assets/js/projects.js' | relative_url }}" defer></script>
</body>
</html>
